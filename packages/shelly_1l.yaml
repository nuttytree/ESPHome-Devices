substitutions:
  board: esp01_1m
  light_wattage: '0'

packages:
  base:   !include device_base_esp8266.yaml

binary_sensor:
  - platform: gpio
    id: on_button
    pin:
      number: GPIO4
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - light.turn_on: shelly_light
  - platform: gpio
    id: off_button
    pin:
      number: GPIO14
    filters:
      - delayed_on_off: 50ms
    on_press:
      then:
        - light.turn_off: shelly_light

light:
  - platform: binary
    id: shelly_light
    name: ${device_name}
    output: shelly_relay
    on_turn_on:
      - component.update: light_power
    on_turn_off:
      - component.update: light_power

output:
  - platform: gpio
    pin: GPIO5
    id: shelly_relay

sensor:
  - platform: template
    id: light_power
    name: ${device_name} Power
    unit_of_measurement: "W"
    device_class: power
    state_class: measurement
    accuracy_decimals: 1
    update_interval: never
    lambda: |-
      return id(shelly_light).current_values.is_on() ? ${light_wattage} : 0.0;
    filters:
      - heartbeat:
          period: 10s
          optimistic: true    
  - platform: total_daily_energy
    name: ${device_name}
    power_id: light_power
    method: left

status_led:
  pin: GPIO0
