substitutions:
  device_id: second-garage-door
  device_name: Second Garage Door
  board: d1_mini
  api_key: !secret second_garage_door_key
  pwd: !secret second_garage_door_pwd
  id_prefix: second_garage_door
  uart_tx_pin: D1
  uart_rx_pin: D2
  input_obst_pin: D7
  dry_contact_open_pin: D5
  dry_contact_close_pin: D6
  discrete_open_pin: D0
  discrete_close_pin: D8

packages:
  ratgdo:
    url: https://github.com/ratgdo/esphome-ratgdo
    ref: main
    files: [base_drycontact.yaml]
    refresh: 1s
  device_base: !include ./packages/device_base_esp8266.yaml

button:
  - id: !remove ${id_prefix}_restart
  - id: !remove ${id_prefix}_safe_mode

ota:
  - id: !remove ${id_prefix}_ratgdo_ota

text_sensor:
  - id: !remove ${id_prefix}_firmware_version

web_server: !remove
